name: security

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: python -m pip install --upgrade pip bandit
      - name: Run bandit
        run: bandit -q -r installer.py plugins
